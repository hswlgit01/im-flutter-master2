def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// 与项目根目录 brand.properties 统一（修改包名/个推 AppId 请编辑该文件）
def brandProps = new Properties()
def brandFile = new File(rootProject.projectDir.parentFile, 'brand.properties')
if (brandFile.exists()) {
    brandFile.withReader('UTF-8') { brandProps.load(it) }
}
def brandApplicationId = brandProps.getProperty('applicationId', 'com.freechat.app')
def brandGetuiAppId = brandProps.getProperty('getuiAppId', 'u7XipjV3Dt6qDLMhwRE8U2')

subprojects { afterEvaluate { android { compileSdkVersion 34 } } }

//apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // applicationId 与项目根目录 brand.properties 中 applicationId 一致
        applicationId brandApplicationId
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        multiDexEnabled true

        // 在模拟器上运行需要添加 x86 架构支持
        // 真机使用: "arm64-v8a", "armeabi-v7a"
        // 模拟器使用: "x86", "x86_64"
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
        }

        lintOptions {
            disable 'InvalidPackage'
            disable "Instantiatable"
            checkReleaseBuilds false
            abortOnError false
        }

        // GeTui 个推配置（GETUI_APPID 与 brand.properties 中 getuiAppId 一致）
        manifestPlaceholders = [
            GETUI_APPID    : brandGetuiAppId,
            XIAOMI_APP_ID  : "",
            XIAOMI_APP_KEY : "",
            MEIZU_APP_ID   : "",
            MEIZU_APP_KEY  : "",
            HUAWEI_APP_ID  : "",
            OPPO_APP_KEY   : "",
            OPPO_APP_SECRET: "",
            VIVO_APP_ID    : "",
            VIVO_APP_KEY   : "",
            HONOR_APP_ID   : "",
        ]
    }

    signingConfigs {
        release {
            keyAlias 'openim'
            keyPassword 'openim'
            storeFile file('./openim')
            storePassword 'openim'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.release
        }
        profile {
            signingConfig signingConfigs.release

        }
        release {
//            minifyEnabled false
//            useProguard false
//            shrinkResources false
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    android.applicationVariants.all {
        variant ->
            variant.outputs.all {
                outputFileName = "F-DEMO_${versionName}(${versionCode})_${buildType.name}_${buildTime()}.apk"
            }
    }

    packagingOptions {
      // other options here

      /* Fix for ffmpeg-kit-react-native START */
        pickFirst 'lib/arm64-v8a/libgojni.so'
        pickFirst 'lib/armeabi-v7a/libgojni.so'
        pickFirst 'lib/x86/libgojni.so'
        pickFirst 'lib/x86_64/libgojni.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libavcodec.so'
        pickFirst 'lib/arm64-v8a/libavformat.so'
        pickFirst 'lib/arm64-v8a/libavutil.so'
        pickFirst 'lib/arm64-v8a/libswscale.so'
        pickFirst 'lib/arm64-v8a/libavdevice.so'
        pickFirst 'lib/arm64-v8a/libavfilter.so'
        pickFirst 'lib/arm64-v8a/libffmpegkit.so'
        pickFirst 'lib/arm64-v8a/libffmpegkit_abidetect.so'
        pickFirst 'lib/arm64-v8a/libswresample.so'
        pickFirst 'lib/arm64-v8a/libswscale.so'
        pickFirst 'lib/x86/libavcodec.so'
        pickFirst 'lib/x86/libavformat.so'
        pickFirst 'lib/x86/libavutil.so'
        pickFirst 'lib/x86/libswscale.so'
        pickFirst 'lib/x86/libavdevice.so'
        pickFirst 'lib/x86/libavfilter.so'
        pickFirst 'lib/x86/libffmpegkit.so'
        pickFirst 'lib/x86/libffmpegkit_abidetect.so'
        pickFirst 'lib/x86/libswresample.so'
        pickFirst 'lib/x86/libswscale.so'
        pickFirst 'lib/x86_64/libavcodec.so'
        pickFirst 'lib/x86_64/libavformat.so'
        pickFirst 'lib/x86_64/libavutil.so'
        pickFirst 'lib/x86_64/libswscale.so'
        pickFirst 'lib/x86_64/libavdevice.so'
        pickFirst 'lib/x86_64/libavfilter.so'
        pickFirst 'lib/x86_64/libffmpegkit.so'
        pickFirst 'lib/x86_64/libffmpegkit_abidetect.so'
        pickFirst 'lib/x86_64/libswresample.so'
        pickFirst 'lib/x86_64/libswscale.so'
      /* Fix for ffmpeg-kit-react-native END */
    }
}

flutter {
    source '../..'
}

// 添加全局配置来解决类冲突
configurations.all {
    resolutionStrategy {
        // 方法: 完全排除io.openim:core-sdk依赖
        exclude group: 'io.openim', module: 'core-sdk'

        // 强制使用可用的 FFmpeg Kit 实现（替代不可用的 com.arthenica）
        force 'io.github.maitrungduc1410:ffmpeg-kit-https:6.0.1'
    }

    // 排除不可用的旧 FFmpeg Kit 依赖
    exclude group: 'com.arthenica', module: 'ffmpeg-kit-https'
}

dependencies {
    // 修改本地库依赖，确保使用唯一的SDK版本
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])

    // 如果想排除本地AAR，可以使用下面的代码替代上面的行：
    // implementation fileTree(dir: 'libs', include: ['*.jar'])
    // implementation fileTree(dir: 'libs', include: ['*.aar']) {
    //     exclude 'open_im_sdk.aar'
    // }

    implementation 'androidx.multidex:multidex:2.0.1'

    // 显式添加可用的 FFmpeg Kit 实现（替代 com.arthenica:ffmpeg-kit-https:6.0-2）
    implementation 'io.github.maitrungduc1410:ffmpeg-kit-https:6.0.1'

    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-messaging" // FCM

    // GeTui 个推 SDK
    implementation 'com.getui:gtsdk:3.2.13.0'  // 个推核心SDK
    implementation 'com.getui:gtc:3.1.10.0'    // 个推核心组件
}

static def buildTime() {
    return new Date().format("MMddHHmm", TimeZone.getTimeZone("GMT+08:00"))
}