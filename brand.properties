# 应用品牌/渠道唯一配置：修改此处后执行
#   dart run tool/sync_brand.dart
# 再执行 Android 构建（Gradle 会读取本文件）。
#
# 说明：applicationId 为安装包名；AndroidManifest 里 package= 的是 Java 包名/R 类命名空间，
# 可与 applicationId 不同。若要把 Java 包名也改掉，需自行迁移 MainActivity 目录与 manifest。
#
# Android applicationId（安装包名 / 与 iOS 默认共用时可与 iosBundleId 相同）
applicationId=com.flutterOpenIM2.app
#
# iOS Bundle Identifier；留空则与 applicationId 相同
iosBundleId=
#
# 个推 GeTui（与 android/app/build.gradle 中 manifestPlaceholders.GETUI_APPID 对应）
getuiAppId=u7XipjV3Dt6qDLMhwRE8U2
#
# 渠道标识（上报/统计用，Dart 侧读取 AppBrand.channelId）
channelId=official
#
# Shorebird 应用 ID（与 shorebird.yaml 中 app_id 同步）
shorebirdAppId=af3b7de6-8fe4-4499-9fc8-a46c2bdd8f10
