name: Build Flutter App

on:
  push:
    branches: [master, main, dev]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: '构建环境'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  # ========== 构建 Android APK ==========
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          ENV_VALUE="${{ github.event.inputs.environment }}"
          ENV_VALUE="${ENV_VALUE:-prod}"
          flutter build apk --release --dart-define=ENV="$ENV_VALUE"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # apk-server 容器挂载了 /data/app/apk/public，把 APK 丢进去就能直接下载
      - name: Copy APK to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "build/app/outputs/flutter-apk/app-release.apk"
          target: "/data/app/apk/public/"
          strip_components: 5

  # ========== 构建 iOS（仅在 tag 推送时触发，需要 Mac Runner） ==========
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          cd ios
          pod install
          cd ..
          flutter build ipa --release --dart-define=ENV=prod

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: build/ios/ipa/*.ipa
