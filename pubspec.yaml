  # pasteboard:
  #   git:
  #     url: https://github.com/MixinNetwork/flutter-plugins.git
  #     path: packages/pasteboard
  #     ref: main
  # 使用 Git 最新版本修复 Flutter 3.27 兼容性问题
  # flutter_picker_plus 降级 Flutter 后不再需要 Git 覆盖
  # flutter_picker_plus:
  #   git:
  #     url: https://github.com/octologs/flutter_picker_plus.git
  #     ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.2.19
  hive_generator: ^2.0.0
  build_runner: ^2.3.3
