  flutter_spinkit: ^5.1.0
  percent_indicator: ^4.2.3
  flutter_image_compress: ^2.1.0
  flutter_datetime_picker_plus: ^2.1.0
  font_awesome_flutter: 10.7.0
  dart_date: ^1.1.1
  video_compress: ^3.1.2
  just_audio: ^0.9.41
  audio_session: ^0.1.21
  vibration: ^1.7.6
