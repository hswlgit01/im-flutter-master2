  record: 5.1.2
  record_android: 1.2.5
  record_platform_interface: 1.2.0
  # 降级以兼容 Flutter 3.24.5（避免 withValues/semanticsIdentifier 错误）
  flutter_spinkit: 5.1.0
  flutter_picker_plus: 1.1.0
  # 修复 sensors_plus 7.0.0 与旧版 Gradle 插件不兼容的问题
  sensors_plus: 6.1.1
